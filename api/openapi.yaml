          type: string
        disabled:
          type: boolean
        created_at:
          format: date-time
          type: string
        updated_at:
          format: date-time
          type: string
        remarks:
          nullable: true
          type: string
        region:
          nullable: true
          type: string
      type: object
    post_attachments_request:
      properties:
        key:
          example: "{{key to send attachment}}"
          type: string
        x-4me-expiration:
          example: "{{x-4me-expiration}}"
          type: string
        x-4me-signature:
          example: "{{x-4me-signature}}"
          type: string
        file:
          format: binary
          type: string
      type: object
    post_export_request:
      properties:
        type:
          example: "sites,teams"
          type: string
        from:
          example: 20121231
          type: integer
        export_format:
          example: csv
          type: string
        line_separator:
          example: lf
          type: string
      type: object
