        \ - Команда поддержки 2 линии ОПО\n\nlocation - Локация\n\nprod_owner - Пр\
        одукт-владелец ДИТ\n\nmanager - Владелец КЕ\n\nadmin_group - Группа Админи\
        страторов КЕ\n\ncurator_ci - Куратор КЕ\n\nhost_org - Организация-собствен\
        ник\n\njustification - Основание передачи\n\ncom_date - Дата ввода в экспл\
        уатацию\n\ndc - ЦОД\n\nspace - Площадка (Адрес площадки ЦОД)\n\nroom - Пом\
        ещение (помещение в адресе)\n\nrack - Стойка\n\nunit - Unit\n\nmodel - Мод\
        ель\n\nform_factor - Form factor\n\nmodel_unit - Количество Unit\n\nmodel_unit\
