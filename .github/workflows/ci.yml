name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Go mod
        working-directory: .
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Validate OpenAPI spec
        run: |
          docker run --rm -v "${{ github.workspace }}:/local" \
            openapitools/openapi-generator-cli:v7.8.0 validate \
            -i /local/openapi/openapi.yaml
