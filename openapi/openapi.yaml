  /v1/requests/assigned_to_my_team:
    get:
      tags:
      - 1. Requests
      summary: GetIssuesList (assigned to my team)
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
        example: Bearer {{system_user acess token}}
      - name: X-4me-Account
        in: header
        schema:
          type: string
        example: '{{X-4me-Account}}'
      responses:
        '200':
          description: OK
          headers:
            Server:
              schema:
                type: string
                example: nginx/1.20.1
            Date:
              schema:
                type: string
                example: Thu, 28 Jul 2022 10:17:20 GMT
            Content-Type:
              schema:
                type: string
                example: application/json; charset=utf-8
            Transfer-Encoding:
              schema:
                type: string
                example: chunked
            Connection:
              schema:
                type: string
                example: keep-alive
            Vary:
              schema:
                type: string
                example: Accept-Encoding
            Cache-Control:
              schema:
                type: string
                example: no-store
            Content-Security-Policy:
              schema:
                type: string
                example: default-src 'none'
            ETag:
              schema:
                type: string
                example: W/"5706f63b086dbf431030886af61add09"
            X-RateLimit-Limit:
              schema:
                type: integer
                example: '3600'
            X-RateLimit-Remaining:
              schema:
                type: integer
                example: '3594'
            X-RateLimit-Reset:
              schema:
                type: integer
                example: '1659006756'
            X-Request-Id:
              schema:
                type: string
                example: Root03eaf45a-c6f2-4293-9cc5-78958b475cc3
            X-Runtime:
              schema:
                type: number
                example: '89.000000'
            Strict-Transport-Security:
              schema:
                type: string
                example: max-age=31536000; includeSubDomains; preload
            X-XSS-Protection:
              schema:
                type: string
                example: 1; mode=block
            X-Content-Type-Options:
              schema:
                type: string
                example: nosniff
            Content-Encoding:
              schema:
                type: string
                example: gzip
          content:
            application/json:
              schema:
                type: object
              example:
