# https://developer.xurrent.com/v1/requests/ — predefined filters and lifecycle
paths:
  /v1/requests/waiting_for_me:
    get:
      tags:
      - Requests
      summary: List requests (waiting for me predefined filter)
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/requests/problem_management_review:
    get:
      tags:
      - Requests
      summary: List requests (problem management review predefined filter)
