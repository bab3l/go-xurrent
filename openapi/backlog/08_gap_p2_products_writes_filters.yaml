# P2: Products POST/PATCH and collection filters (developer.xurrent.com/v1/products/)
paths:
  /v1/products:
    post:
      tags:
      - Products
      summary: Create a product
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
  /v1/products/{id}:
    patch:
      tags:
      - Products
      summary: Update a product
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
  /v1/products/disabled:
    get:
      tags:
      - Products
      summary: List disabled products
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/products/enabled:
    get:
      tags:
      - Products
      summary: List enabled products
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/products/supported_by_my_teams:
    get:
      tags:
      - Products
      summary: List products supported by API user teams
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
