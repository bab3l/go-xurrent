# https://developer.xurrent.com/v1/problems/ — predefined filters + archive/trash/restore
paths:
  /v1/problems/active:
    get:
      tags:
      - Problems
      summary: List active problems
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/problems/known_errors:
    get:
      tags:
      - Problems
      summary: List known_errors problems
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/problems/progress_halted:
    get:
      tags:
      - Problems
      summary: List progress_halted problems
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/problems/solved:
    get:
      tags:
      - Problems
      summary: List solved problems
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/problems/managed_by_me:
    get:
      tags:
      - Problems
      summary: List problems managed by API user
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/problems/assigned_to_my_team:
    get:
      tags:
      - Problems
      summary: List problems assigned to API user's teams
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/problems/assigned_to_me:
    get:
      tags:
      - Problems
      summary: List problems assigned to API user
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
