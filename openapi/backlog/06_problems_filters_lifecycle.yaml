            application/json:
              schema:
                type: array
                items:
                  type: object
  /v1/problems/{id}/archive:
    post:
      tags:
      - Problems
      summary: Archive a problem
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
