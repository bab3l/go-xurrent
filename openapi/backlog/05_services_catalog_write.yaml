# https://developer.xurrent.com/v1/services/ , service_offerings, calendars, request_templates, service_level_agreements
paths:
  /v1/services:
    post:
      tags:
      - Services
      summary: Create a service
      parameters:
      - name: Authorization
        in: header
        schema:
          type: string
      - name: X-4me-Account
        in: header
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
  /v1/services/{id}:
    patch:
      tags:
      - Services
      summary: Update a service
      parameters:
      - in: path
        name: id
        required: true
